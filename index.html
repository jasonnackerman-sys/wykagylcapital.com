<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wykagyl Capital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1f3c;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
    }
    .firm-name {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 2rem auto;
    }
    .contact-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }
    .email a {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 1px;
    }
    .email a:hover {
      color: #ffffff;
      border-color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="firm-name">Wykagyl Capital</p>
    <div class="divider"></div>
    <p class="contact-label">Contact</p>
    <p class="email"><a href="mailto:jason@wykagylcapital.com">jason@wykagylcapital.com</a></p>
  </div>
</body>
</html>
